<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity | Live Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 1rem;
            pointer-events: none;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: #38bdf8;
            box-shadow: 0 0 10px #38bdf8;
            animation: scan 3s linear infinite;
            display: none;
        }

        @keyframes scan {
            0% {
                top: 10%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 90%;
                opacity: 0;
            }
        }

        .scanning .scan-line {
            display: block;
        }

        /* Home Button Style */
        .home-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease-in-out;
        }

        .home-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center p-4">

    <!-- Home Button -->
    <a href="index.html"
        class="home-btn fixed bottom-5 right-5 z-50 text-white px-6 py-3 rounded-full font-semibold flex items-center gap-2 no-underline">
        <span class="text-xl">🏠</span> Back to Home
    </a>

    <!-- Header -->
    <header class="mb-8 text-center animate-fade-in-down">
        <h1
            class="text-3xl md:text-5xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
            Live Customer Scanner
        </h1>
        <p class="text-gray-400">Connect Iriun Webcam or device camera to capture</p>
    </header>

    <!-- Main Interface -->
    <main class="w-full max-w-4xl glass-panel rounded-3xl p-6 md:p-8 shadow-2xl relative">

        <!-- Camera Selector -->
        <div class="mb-6 flex justify-center">
            <div class="relative w-full max-w-sm">
                <i class="fas fa-camera absolute left-3 top-3 text-gray-400"></i>
                <select id="cameraSelect"
                    class="w-full bg-slate-800 text-white border border-slate-600 rounded-lg py-2.5 pl-10 pr-4 focus:ring-2 focus:ring-blue-500 focus:outline-none appearance-none cursor-pointer">
                    <option value="" disabled selected>Select Camera Input...</option>
                </select>
                <i class="fas fa-chevron-down absolute right-3 top-3 text-gray-400 pointer-events-none"></i>
            </div>
        </div>

        <!-- Viewfinder Area -->
        <div
            class="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-inner border border-gray-800 group">

            <!-- Video Feed -->
            <video id="videoFeed" autoplay playsinline class="w-full h-full object-cover"></video>

            <!-- Captured Canvas (Hidden initially) -->
            <canvas id="photoCanvas" class="hidden w-full h-full object-cover absolute top-0 left-0"></canvas>

            <!-- Guide Overlay -->
            <div class="scanner-overlay" id="scannerOverlay">
                <div class="scan-line"></div>
                <!-- Corner Markers -->
                <div class="absolute top-4 left-4 w-8 h-8 border-t-4 border-l-4 border-blue-500 rounded-tl-lg"></div>
                <div class="absolute top-4 right-4 w-8 h-8 border-t-4 border-r-4 border-blue-500 rounded-tr-lg"></div>
                <div class="absolute bottom-4 left-4 w-8 h-8 border-b-4 border-l-4 border-blue-500 rounded-bl-lg"></div>
                <div class="absolute bottom-4 right-4 w-8 h-8 border-b-4 border-r-4 border-blue-500 rounded-br-lg">
                </div>
            </div>

            <!-- Error Message -->
            <div id="cameraError"
                class="hidden absolute inset-0 flex items-center justify-center bg-gray-900 bg-opacity-90 text-center p-6">
                <div>
                    <i class="fas fa-exclamation-triangle text-4xl text-yellow-500 mb-2"></i>
                    <p class="text-gray-300">Camera access denied or not found.<br>Please allow permissions and try
                        again.</p>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="mt-8 flex flex-col md:flex-row justify-center items-center gap-4">

            <button id="btnCapture"
                class="group relative px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-full text-lg shadow-lg hover:shadow-blue-500/50 transition-all flex items-center gap-3">
                <span class="w-4 h-4 rounded-full bg-white group-hover:animate-pulse"></span>
                Capture Photo
            </button>

            <div id="postCaptureControls" class="hidden flex gap-4">
                <button id="btnRetake"
                    class="px-6 py-3 bg-gray-700 hover:bg-gray-600 text-white font-semibold rounded-full transition-all">
                    <i class="fas fa-redo mr-2"></i> Retake
                </button>
                <button id="btnUpload"
                    class="px-6 py-3 bg-green-600 hover:bg-green-500 text-white font-bold rounded-full shadow-lg hover:shadow-green-500/50 transition-all">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> Upload to Pipeline
                </button>
            </div>
        </div>

        <!-- Status Notification -->
        <div id="statusMsg" class="mt-4 text-center text-sm font-medium text-blue-400 opacity-0 transition-opacity">
            Waiting for camera...
        </div>

    </main>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('photoCanvas');
        const cameraSelect = document.getElementById('cameraSelect');
        const overlay = document.getElementById('scannerOverlay');
        const btnCapture = document.getElementById('btnCapture');
        const controlsGroup = document.getElementById('postCaptureControls');
        const btnRetake = document.getElementById('btnRetake');
        const btnUpload = document.getElementById('btnUpload');
        const statusMsg = document.getElementById('statusMsg');
        const errorMsg = document.getElementById('cameraError');

        let currentStream = null;

        // 1. Enumerate Cameras
        async function getCameras() {
            try {
                // Trigger permission prompt first
                await navigator.mediaDevices.getUserMedia({ video: true });

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = '<option value="" disabled selected>Select Camera...</option>';

                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    // Detect "Iriun" in label if present, otherwise generic
                    const label = device.label || `Camera ${index + 1}`;
                    option.text = label;
                    if (label.toLowerCase().includes('iriun')) {
                        option.text = "📱 " + label + " (Recommended)";
                    }
                    cameraSelect.appendChild(option);
                });

                if (videoDevices.length > 0) {
                    cameraSelect.value = videoDevices[0].deviceId;
                    startCamera(videoDevices[0].deviceId);
                } else {
                    showError();
                }

            } catch (err) {
                console.error("Error enumerating devices:", err);
                showError();
            }
        }

        // 2. Start Camera Stream
        async function startCamera(deviceId) {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            try {
                const constraints = {
                    video: {
                        deviceId: deviceId ? { exact: deviceId } : undefined,
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    statusMsg.innerText = "Camera Active - Ready to Scan";
                    statusMsg.style.opacity = 1;
                    overlay.classList.remove('scanning'); // ensure idle state
                    errorMsg.classList.add('hidden');
                };

            } catch (err) {
                console.error("Stream Error:", err);
                showError();
            }
        }

        function showError() {
            errorMsg.classList.remove('hidden');
            statusMsg.innerText = "Error accessing camera";
            statusMsg.classList.add('text-red-400');
        }

        // Event Listeners
        cameraSelect.addEventListener('change', (e) => startCamera(e.target.value));

        btnCapture.addEventListener('click', () => {
            // "Scan" effect
            overlay.classList.add('scanning');
            statusMsg.innerText = "Scanning subject...";

            // Artificial delay for "Scanning" UX
            setTimeout(() => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                // Show result
                video.classList.add('hidden');
                canvas.classList.remove('hidden');

                // Toggle UI
                btnCapture.classList.add('hidden');
                controlsGroup.classList.remove('hidden');
                overlay.classList.remove('scanning');
                statusMsg.innerText = "Image Captured Successfully";
                statusMsg.classList.replace('text-blue-400', 'text-green-400');
            }, 800);
        });

        btnRetake.addEventListener('click', () => {
            canvas.classList.add('hidden');
            video.classList.remove('hidden');
            btnCapture.classList.remove('hidden');
            controlsGroup.classList.add('hidden');
            statusMsg.innerText = "Ready to Scan";
            statusMsg.classList.replace('text-green-400', 'text-blue-400');
        });

        btnUpload.addEventListener('click', () => {
            // Simulation
            const originalText = btnUpload.innerHTML;
            btnUpload.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Uploading...`;

            setTimeout(() => {
                btnUpload.innerHTML = `<i class="fas fa-check mr-2"></i> Done!`;
                statusMsg.innerText = "Customer image uploaded to VTO Pipeline ID #4921";

                // Reset after 2s
                setTimeout(() => {
                    btnUpload.innerHTML = originalText;
                }, 2000);
            }, 1500);
        });

        // Initialize on load
        window.addEventListener('load', getCameras);

    </script>
</body>

</html>
